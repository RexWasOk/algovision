<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVision</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header>
            <div>
                <div class="logo">Algo<span>Vision</span></div>
                <div class="tagline">ML-predicted sorting algorithm races</div>
            </div>
        </header>

        <div class="control-panel">
            <div class="control-group">
                <label>Array Size <span class="value" id="sizeVal">2000</span></label>
                <input type="range" id="sizeSlider" min="100" max="10000" step="100" value="2000">
            </div>
            <div class="control-group">
                <label>Sorted Ratio <span class="value" id="sortedVal">0.0</span></label>
                <input type="range" id="sortedSlider" min="0" max="100" value="0">
            </div>
            <div class="control-group">
                <label>Duplicate Ratio <span class="value" id="dupVal">0.1</span></label>
                <input type="range" id="dupSlider" min="0" max="100" value="10">
            </div>
            <div class="control-group">
                <label>Variance <span class="value" id="varVal">5.0</span></label>
                <input type="range" id="varSlider" min="1" max="50" value="5">
            </div>
            <button class="primary" id="raceBtn">Run race</button>
        </div>

        <div class="prediction-banner" id="predictionBanner">
            <div class="label">ML Prediction</div>
            <div class="prediction" id="predictionText">—</div>
            <div class="confidence-bars" id="confidenceBars"></div>
        </div>

        <div class="section-label">Live race results</div>
        <div class="race-grid" id="raceGrid">
            <div class="loading">Configure parameters and run a race</div>
        </div>

        <div class="section-label">Animated sort</div>
        <div class="control-panel" style="grid-template-columns: 1fr 1fr auto;">
            <div class="control-group">
                <label>Algorithm</label>
                <select id="animAlgoSelect" style="width:100%; background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border); border-radius:6px; padding:0.5rem;">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="merge">Merge Sort</option>
                    <option value="quick">Quick Sort</option>
                    <option value="heap">Heap Sort</option>
                    <option value="shell">Shell Sort</option>
                    <option value="counting">Counting Sort</option>
                </select>
            </div>
            <div class="control-group">
                <label>Elements <span class="value" id="animSizeVal">60</span></label>
                <input type="range" id="animSizeSlider" min="10" max="150" value="60">
            </div>
            <button class="primary" id="animBtn" style="grid-column:auto;">Animate</button>
        </div>
        <canvas id="animCanvas" width="1320" height="320" style="width:100%; height:320px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; display:block;"></canvas>

        <div class="section-label">Pathfinding visualizer</div>
        <div class="control-panel" style="grid-template-columns: 1fr 1fr auto auto;">
            <div class="control-group">
                <label>Algorithm</label>
                <select id="graphAlgoSelect" style="width:100%; background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border); border-radius:6px; padding:0.5rem;">
                    <option value="bfs">BFS</option>
                    <option value="dfs">DFS</option>
                    <option value="dijkstra">Dijkstra</option>
                    <option value="astar">A*</option>
                </select>
            </div>
            <div class="control-group">
                <label style="visibility:hidden;">.</label>
                <div style="font-size:0.78rem; color:var(--text-secondary);">Click grid to place walls. Drag start/end to move them.</div>
            </div>
            <button class="primary" id="clearWallsBtn" style="grid-column:auto;">Clear walls</button>
            <button class="primary" id="findPathBtn" style="grid-column:auto;">Find path</button>
        </div>
        <canvas id="gridCanvas" width="1320" height="450" style="width:100%; height:450px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; display:block; cursor:pointer;"></canvas>
    </div>

    <script src="js/app.js"></script>
    <script src="js/animate.js"></script>
    <script src="js/pathfinder.js"></script>
</body>
</html>
